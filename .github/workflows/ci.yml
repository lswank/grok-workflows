name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax-check engine and all harnesses
        run: |
          for f in src/*.mjs workflows/*.mjs; do
            node --check "$f"
          done

      - name: Run engine tests (mock mode, no grok needed)
        run: npm test

      - name: Smoke-run every harness under mock
        run: |
          set -e
          printf 'Login broken on mobile\nTypo in footer\nData loss on save\n' > /tmp/backlog.txt
          printf 'Node.js was created in 2009. Water boils at 50C at sea level.\n' > /tmp/doc.txt
          run() { echo "→ $1"; GROK_WORKFLOWS_MOCK=1 GROK_WORKFLOWS_QUIET=1 node "workflows/$1.mjs" "$2" | head -c 1 | grep -q . ; }
          run deep-research "is the earth round"
          run deep-verify "/tmp/doc.txt"
          run sort-tournament "severity :: a | b | c"
          run root-cause "why did the build break"
          run triage "/tmp/backlog.txt"
          run migrate "rename X to Y -- src/"
          run rule-mine "/tmp/doc.txt"
          run brainstorm-tournament "name a tool :: short"
          run eval-skill "do a thing -- 3"
